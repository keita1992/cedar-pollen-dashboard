<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東京都 スギ花粉飛散ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--accent2:#818cf8;--danger:#f87171;--success:#4ade80;--warning:#fbbf24}
body{font-family:'Segoe UI','Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border-bottom:1px solid var(--border);padding:1.5rem 2rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.header h1{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{color:var(--muted);font-size:.85rem}
.controls{display:flex;gap:.75rem;margin-left:auto;flex-wrap:wrap;align-items:center}
.controls select,.controls button{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:.5rem;padding:.5rem 1rem;font-size:.85rem;cursor:pointer;transition:all .2s}
.controls select:hover,.controls button:hover{border-color:var(--accent)}
.controls button.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1.25rem;padding:1.5rem 2rem;max-width:1600px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1.25rem;transition:transform .2s}
.card:hover{transform:translateY(-2px)}
.card h2{font-size:.95rem;color:var(--muted);margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
.card h2 .icon{font-size:1.1rem}
.card.full{grid-column:1/-1}
.card.half{grid-column:span 1}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem}
.kpi{text-align:center;padding:1rem;background:rgba(255,255,255,.03);border-radius:.75rem}
.kpi .value{font-size:1.8rem;font-weight:800;line-height:1.2}
.kpi .label{font-size:.75rem;color:var(--muted);margin-top:.25rem}
.kpi.blue .value{color:var(--accent)}
.kpi.purple .value{color:var(--accent2)}
.kpi.red .value{color:var(--danger)}
.kpi.green .value{color:var(--success)}
.kpi.yellow .value{color:var(--warning)}
.chart-wrap{position:relative;width:100%;height:350px}
.card.tall .chart-wrap{height:450px}
.legend-custom{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.5rem}
.legend-custom span{font-size:.7rem;padding:.2rem .5rem;border-radius:.25rem;background:rgba(255,255,255,.05);cursor:pointer;transition:opacity .2s}
.legend-custom span:hover{opacity:.7}
.rank-table{width:100%;border-collapse:collapse;font-size:.85rem}
.rank-table th,.rank-table td{padding:.5rem .75rem;text-align:left;border-bottom:1px solid var(--border)}
.rank-table th{color:var(--muted);font-weight:600;font-size:.75rem;text-transform:uppercase}
.rank-table tr:hover{background:rgba(255,255,255,.03)}
.bar-cell{display:flex;align-items:center;gap:.5rem}
.bar-cell .bar{height:8px;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.footer{text-align:center;padding:2rem;color:var(--muted);font-size:.75rem;border-top:1px solid var(--border);margin-top:1rem}
@media(max-width:768px){.header{padding:1rem}.dashboard{padding:1rem;gap:1rem}.header h1{font-size:1.2rem}.controls{margin-left:0;width:100%}}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>🌲 東京都スギ花粉ダッシュボード</h1>
    <div class="sub">Tokyo Cedar Pollen Dashboard — 観測地点12箇所の花粉飛散データ</div>
  </div>
  <div class="controls">
    <select id="yearSelect"></select>
    <select id="stationSelect"><option value="__all__">全地点平均</option></select>
  </div>
</div>

<div class="dashboard">
  <!-- KPI Cards -->
  <div class="card full" id="kpiCard">
    <h2><span class="icon">📊</span>シーズンサマリー <span id="kpiYear"></span></h2>
    <div class="kpi-grid" id="kpiGrid"></div>
  </div>

  <!-- Main line chart: seasonal trend -->
  <div class="card full tall">
    <h2><span class="icon">📈</span>花粉飛散量の推移（日別）</h2>
    <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
  </div>

  <!-- Year comparison overlay -->
  <div class="card full tall">
    <h2><span class="icon">🔄</span>年度別比較（全地点平均・日番号ベース）</h2>
    <div class="chart-wrap"><canvas id="compareChart"></canvas></div>
  </div>

  <!-- Cumulative chart -->
  <div class="card half">
    <h2><span class="icon">📊</span>累積飛散量</h2>
    <div class="chart-wrap"><canvas id="cumulativeChart"></canvas></div>
  </div>

  <!-- Heatmap-like bar chart by station -->
  <div class="card half">
    <h2><span class="icon">🏙️</span>地点別シーズン合計</h2>
    <div class="chart-wrap"><canvas id="stationBarChart"></canvas></div>
  </div>

  <!-- Monthly breakdown -->
  <div class="card half">
    <h2><span class="icon">📅</span>月別飛散量</h2>
    <div class="chart-wrap"><canvas id="monthlyChart"></canvas></div>
  </div>

  <!-- Peak ranking table -->
  <div class="card half">
    <h2><span class="icon">🏆</span>飛散量ピーク日ランキング（全年度TOP10）</h2>
    <div id="rankTable"></div>
  </div>
</div>

<div class="footer">
  データ出典：東京都福祉保健局「花粉情報」アーカイブ（2019, 2021–2025年度）<br>
  ※ 2020年度データは含まれていません
</div>

const STATIONS=["千代田","葛飾","杉並","北","大田","青梅","八王子","多摩","町田","立川","府中","小平"];
const COLORS=["#38bdf8","#818cf8","#f472b6","#fb923c","#4ade80","#fbbf24","#a78bfa","#34d399","#f87171","#60a5fa","#c084fc","#facc15"];
const YEAR_COLORS={"2019":"#38bdf8","2021":"#818cf8","2022":"#f472b6","2023":"#fb923c","2024":"#4ade80","2025":"#fbbf24"};

const years=[...new Set(RAW.map(d=>d.year))].sort();
const yearSel=document.getElementById("yearSelect");
const stationSel=document.getElementById("stationSelect");
years.forEach(y=>{const o=document.createElement("option");o.value=y;o.textContent=y+"年";yearSel.appendChild(o)});
yearSel.value=years[years.length-1];
STATIONS.forEach(s=>{const o=document.createElement("option");o.value=s;o.textContent=s;stationSel.appendChild(o)});

function avg(d){let s=0,c=0;STATIONS.forEach(st=>{if(d[st]!=null){s+=d[st];c++}});return c?s/c:0}
function stationVal(d,st){return st==="__all__"?avg(d):(d[st]||0)}
function getYearData(y){return RAW.filter(d=>d.year===y)}
function dayOfYear(ds){const d=new Date(ds);const s=new Date(d.getFullYear(),0,0);return Math.floor((d-s)/86400000)}

let charts={};

function destroyCharts(){Object.values(charts).forEach(c=>{if(c)c.destroy()});charts={}}

function render(){
  destroyCharts();
  const year=+yearSel.value;
  const station=stationSel.value;
  const yd=getYearData(year);

  // KPI
  const kpiYear=document.getElementById("kpiYear");
  kpiYear.textContent=year+"年";
  const vals=yd.map(d=>stationVal(d,station));
  const total=vals.reduce((a,b)=>a+b,0);
  const peak=Math.max(...vals);
  const peakIdx=vals.indexOf(peak);
  const peakDate=yd[peakIdx]?yd[peakIdx].date:"";
  const daysOver30=vals.filter(v=>v>=30).length;
  const seasonStart=yd.findIndex(d=>stationVal(d,station)>=1);
  const seasonEnd=yd.length-1-[...yd].reverse().findIndex(d=>stationVal(d,station)>=1);
  const seasonDays=seasonStart>=0&&seasonEnd>=seasonStart?seasonEnd-seasonStart+1:0;
  
  document.getElementById("kpiGrid").innerHTML=\`
    <div class="kpi blue"><div class="value">\${total.toFixed(1)}</div><div class="label">シーズン合計 (個/cm²)</div></div>
    <div class="kpi red"><div class="value">\${peak.toFixed(1)}</div><div class="label">最大飛散日<br>\${peakDate}</div></div>
    <div class="kpi purple"><div class="value">\${(total/yd.length).toFixed(1)}</div><div class="label">日平均 (個/cm²)</div></div>
    <div class="kpi yellow"><div class="value">\${daysOver30}</div><div class="label">30個/cm²超の日数</div></div>
    <div class="kpi green"><div class="value">\${seasonDays}</div><div class="label">飛散期間（日）</div></div>
  \`;

  // Line chart
  const lineCtx=document.getElementById("lineChart").getContext("2d");
  if(station==="__all__"){
    charts.line=new Chart(lineCtx,{type:"line",data:{labels:yd.map(d=>d.date),datasets:STATIONS.map((s,i)=>({label:s,data:yd.map(d=>d[s]),borderColor:COLORS[i],backgroundColor:COLORS[i]+"33",borderWidth:1.5,pointRadius:0,fill:false,tension:.3}))},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},scales:{x:{type:"time",time:{unit:"month",displayFormats:{month:"M月"}},grid:{color:"#334155"}},y:{grid:{color:"#334155"},title:{display:true,text:"個/cm²",color:"#94a3b8"}}},plugins:{legend:{display:true,position:"bottom",labels:{color:"#94a3b8",usePointStyle:true,pointStyle:"circle",padding:12,font:{size:10}}}}}});
  }else{
    charts.line=new Chart(lineCtx,{type:"line",data:{labels:yd.map(d=>d.date),datasets:[{label:station,data:yd.map(d=>d[station]),borderColor:"#38bdf8",backgroundColor:"#38bdf822",borderWidth:2,pointRadius:1,fill:true,tension:.3}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},scales:{x:{type:"time",time:{unit:"month",displayFormats:{month:"M月"}},grid:{color:"#334155"}},y:{grid:{color:"#334155"},title:{display:true,text:"個/cm²",color:"#94a3b8"}}},plugins:{legend:{labels:{color:"#94a3b8"}}}}});
  }

  // Year comparison
  const compCtx=document.getElementById("compareChart").getContext("2d");
  const compDS=years.map(y=>{
    const d=getYearData(y);
    const mapped=d.map(r=>({x:dayOfYear(r.date),y:stationVal(r,station)}));
    return{label:y+"年",data:mapped,borderColor:YEAR_COLORS[y]||"#fff",borderWidth:y===year?3:1.5,pointRadius:0,tension:.3,borderDash:y===year?[]:[5,5]};
  });
  charts.compare=new Chart(compCtx,{type:"line",data:{datasets:compDS},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},scales:{x:{type:"linear",title:{display:true,text:"年初からの日数",color:"#94a3b8"},grid:{color:"#334155"},min:0,max:150},y:{grid:{color:"#334155"},title:{display:true,text:"個/cm²",color:"#94a3b8"}}},plugins:{legend:{position:"bottom",labels:{color:"#94a3b8",usePointStyle:true,padding:12}}}}});

  // Cumulative
  const cumCtx=document.getElementById("cumulativeChart").getContext("2d");
  const cumDS=years.map(y=>{
    const d=getYearData(y);
    let acc=0;
    const pts=d.map(r=>{acc+=stationVal(r,station);return{x:dayOfYear(r.date),y:+acc.toFixed(1)}});
    return{label:y+"年",data:pts,borderColor:YEAR_COLORS[y]||"#fff",borderWidth:y===year?3:1.5,pointRadius:0,fill:false,tension:.3,borderDash:y===year?[]:[5,5]};
  });
  charts.cumulative=new Chart(cumCtx,{type:"line",data:{datasets:cumDS},options:{responsive:true,maintainAspectRatio:false,scales:{x:{type:"linear",title:{display:true,text:"年初からの日数",color:"#94a3b8"},grid:{color:"#334155"},min:0,max:150},y:{grid:{color:"#334155"},title:{display:true,text:"累積 個/cm²",color:"#94a3b8"}}},plugins:{legend:{position:"bottom",labels:{color:"#94a3b8",usePointStyle:true,padding:12}}}}});

  // Station bar
  const barCtx=document.getElementById("stationBarChart").getContext("2d");
  const stTotals=STATIONS.map(s=>yd.reduce((a,d)=>a+(d[s]||0),0));
  charts.stationBar=new Chart(barCtx,{type:"bar",data:{labels:STATIONS,datasets:[{data:stTotals,backgroundColor:COLORS.map(c=>c+"cc"),borderColor:COLORS,borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:"y",scales:{x:{grid:{color:"#334155"},title:{display:true,text:"合計 個/cm²",color:"#94a3b8"}},y:{grid:{display:false}}},plugins:{legend:{display:false}}}});

  // Monthly
  const monCtx=document.getElementById("monthlyChart").getContext("2d");
  const months=[1,2,3,4,5];
  const monLabels=months.map(m=>m+"月");
  const monData=months.map(m=>{
    return yd.filter(d=>{const mm=new Date(d.date).getMonth()+1;return mm===m}).reduce((a,d)=>a+stationVal(d,station),0);
  });
  charts.monthly=new Chart(monCtx,{type:"bar",data:{labels:monLabels,datasets:[{data:monData,backgroundColor:["#334155","#38bdf8","#f87171","#fbbf24","#4ade80"],borderRadius:8}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{grid:{display:false}},y:{grid:{color:"#334155"},title:{display:true,text:"月間合計 個/cm²",color:"#94a3b8"}}},plugins:{legend:{display:false}}}});

  // Ranking table
  const allWithAvg=RAW.map(d=>({...d,avg:avg(d)}));
  const sorted=[...allWithAvg].sort((a,b)=>b.avg-a.avg).slice(0,10);
  const maxVal=sorted[0]?sorted[0].avg:1;
  let thtml='<table class="rank-table"><thead><tr><th>#</th><th>日付</th><th>全地点平均</th><th></th></tr></thead><tbody>';
  sorted.forEach((d,i)=>{
    const pct=(d.avg/maxVal*100).toFixed(0);
    thtml+=\`<tr><td>\${i+1}</td><td>\${d.date}</td><td>\${d.avg.toFixed(1)}</td><td><div class="bar-cell"><div class="bar" style="width:\${pct}%"></div></div></td></tr>\`;
  });
  thtml+='</tbody></table>';
  document.getElementById("rankTable").innerHTML=thtml;
}

yearSel.addEventListener("change",render);
stationSel.addEventListener("change",render);
render();
</script>
